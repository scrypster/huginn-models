name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "catalog.json"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: models.huginncloud.com
  CF_DISTRIBUTION: E3MZ656OQRZ8GX

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate catalog.json
        run: |
          python3 -c "
          import json, sys
          with open('catalog.json') as f:
              data = json.load(f)
          assert 'version' in data, 'missing version'
          assert 'models' in data, 'missing models'
          assert isinstance(data['models'], list), 'models must be an array'
          required = {'id', 'name', 'url', 'filename', 'size_bytes'}
          for m in data['models']:
              missing = required - m.keys()
              assert not missing, f'model {m.get(\"id\",\"?\")} missing fields: {missing}'
          print(f'OK: {len(data[\"models\"])} models validated')
          "

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::504262955777:role/huginncloud-models-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp catalog.json s3://${{ env.S3_BUCKET }}/catalog.json \
            --cache-control "public, max-age=60" \
            --content-type "application/json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION }} \
            --paths "/catalog.json"
